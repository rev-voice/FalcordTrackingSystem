<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falcord Tracking System</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4a4a4a;
      --primary-dark: #2d2d2d;
      --accent: #FFD700;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg-dark: #2d2d2d;
      --bg-card: #3a3a3a;
      --text-primary: #f5f5f5;
      --text-secondary: #b0b0b0;
      --border: #555555;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a1a 100%);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 1600px; margin: 0 auto; }

    header {
      text-align: center;
      padding: 24px 20px 32px;
      border-bottom: 2px solid var(--accent);
      margin-bottom: 24px;
      background: var(--primary-dark);
      border-radius: var(--radius);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .logo-img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    /* Search/Filter Section */
    .filter-section {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-label {
      font-weight: 600;
      color: var(--accent);
      font-size: 0.9rem;
    }

    .filter-input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-dark);
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    .filter-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .filter-input::placeholder {
      color: var(--text-secondary);
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid var(--danger);
      border-radius: var(--radius);
      padding: 24px;
      margin: 20px auto;
      max-width: 800px;
      text-align: left;
    }

    .error-box h3 {
      color: var(--danger);
      margin-bottom: 12px;
    }

    .error-box code {
      background: var(--bg-dark);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
      color: var(--warning);
    }

    .retry-btn {
      background: var(--accent);
      color: var(--primary-dark);
      border: none;
      padding: 10px 24px;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      font-size: 1rem;
    }

    .retry-btn:hover { opacity: 0.9; }

    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Transposed Table Layout */
    .table-container {
      overflow-x: auto;
      margin: 20px 0;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      min-width: 600px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      word-wrap: break-word;
      word-break: break-word;
      max-width: 140px;
      vertical-align: middle;
      line-height: 1.4;
    }

    th {
      background: var(--primary);
      color: var(--text-primary);
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
    }

    .field-label {
      font-weight: 600;
      color: var(--accent);
      background: var(--primary-dark);
      min-width: 130px;
      position: sticky;
      left: 0;
      z-index: 5;
      border-right: 2px solid var(--border);
    }

    tbody tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.02);
    }

    tbody tr:hover {
      background: rgba(255, 215, 0, 0.08);
    }

    .uuid-header {
      font-family: 'Courier New', monospace;
      color: var(--accent);
      font-size: 0.75rem;
      background: rgba(255, 215, 0, 0.1);
      padding: 6px 8px;
      border-radius: 4px;
      display: inline-block;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .status-ok {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .status-warning {
      background: rgba(245, 158, 11, 0.2);
      color: var(--warning);
      border: 1px solid var(--warning);
    }

    .status-danger {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .value-cell {
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .value-cell:hover {
      background: rgba(255, 215, 0, 0.1);
    }

    .empty-value {
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Scans Panel */
    .scans-panel {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 2px solid var(--accent);
      padding: 20px;
      margin-top: 24px;
      display: none;
    }

    .scans-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .scans-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .close-btn {
      background: var(--primary);
      border: none;
      color: var(--text-primary);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 6px;
    }

    .close-btn:hover { background: var(--danger); }

    .scan-item {
      background: var(--bg-dark);
      padding: 12px 16px;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      margin-bottom: 8px;
    }

    .scan-time {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .scan-meta {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-secondary);
      margin-top: 40px;
      border-top: 1px solid var(--border);
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 1.4rem; }
      .logo-img { width: 50px; height: 50px; }
      th, td { padding: 8px 10px; font-size: 0.75rem; }
      .field-label { min-width: 110px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <img src="falcord_logo_500.png" alt="Falcord Logo" class="logo-img" />
        <div>
          <h1>Falcord Tracking System</h1>
          <p class="subtitle">Gestione digitale trasparente del ciclo di vita</p>
        </div>
      </div>
    </header>

    <div class="filter-section">
      <span class="filter-label">🔍 Filtra per UUID:</span>
      <input type="text" id="uuidFilter" class="filter-input" placeholder="Inserisci parte dell'UUID per filtrare..." />
      <span id="productCount" style="color: var(--text-secondary); font-size: 0.9rem; white-space: nowrap;"></span>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Caricamento dati dal database...</p>
    </div>

    <div id="error" style="display: none;"></div>

    <div id="productsSection" style="display: none;">
      <h2 style="color: var(--accent); margin: 24px 0 16px; font-size: 1.3rem;">📦 Prodotti</h2>
      <div class="table-container">
        <table id="productsTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div id="scansPanel" class="scans-panel">
        <div class="scans-header">
          <div>
            <div class="scans-title">🔍 Storico Scansioni</div>
            <div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 2px;" id="scansUuid"></div>
          </div>
          <button class="close-btn" id="closeScansBtn">×</button>
        </div>
        <div id="scansList"></div>
      </div>
    </div>

    <footer>
      <p>Falcord Tracking System • Gestione Digitale Ciclo di Vita</p>
      <p style="margin-top: 8px;">© 2024 Falcord S.r.l. • v1.3</p>
    </footer>
  </div>

  <script>
    (function() {
      'use strict';

      const CONFIG = {
        DB_URL: 'https://exshynvdaacktlbwfqrq.supabase.co',
        DB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4c2h5bnZkYWFja3RsYndmcXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODI4MDcsImV4cCI6MjA4OTI1ODgwN30.KOGEWBVqh_JGOlb-lhhVM2mcFmmIMToCGbFk6s0cE-c'
      };

      // Mappature dai codici Android
      const PRODUCT_MAP = {
        1: "Mayorca", 2: "Capri", 3: "Mega Yacht", 4: "Megayacht SK",
        5: "Tornado", 6: "Skipper", 7: "Tornado PPL", 8: "Trefil",
        9: "Trefil HT", 10: "Trefil M", 11: "Liberty Oblix", 12: "Liberty SK", 13: "T16"
      };

      const CALZA_MAP = {
        1: "Poliestere", 2: "Nylon", 3: "Oblix", 4: "Dyneema SK78"
      };

      const ANIMA_MAP = {
        1: "Poliestere", 2: "Nylon", 3: "Dyneema SK78", 4: "HMWPE Oblix"
      };

      const COLORE_MAP = {
        1: "Nera", 2: "Blu Navy", 3: "Grigio", 4: "Nero Antracite", 5: "Bianca",
        6: "Bordeaux", 7: "Gialla", 8: "Arancio", 9: "Rosso", 10: "Azzurro"
      };

      const UV_MAP = {
        1: "Scarsa", 2: "Media", 3: "Buona", 4: "Molto Buona", 5: "Ottima", 6: "Eccellente"
      };

      const TRATTAMENTO_MAP = {
        1: "Anima Interna Coating", 2: "Treccia Singola Coating", 3: "Senza Anima"
      };

      const GALLEGG_MAP = {
        1: "Affondante", 2: "Galleggiante", 3: "Semi Galleggiante"
      };

      let allProducts = [];
      let filteredProducts = [];
      let dbClient = null;

      function initDB() {
        if (dbClient) return dbClient;
        try {
          dbClient = window.supabase.createClient(CONFIG.DB_URL, CONFIG.DB_KEY);
          console.log('✓ Database client initialized');
          return dbClient;
        } catch (error) {
          console.error('✗ Database initialization failed:', error);
          throw error;
        }
      }

      function calculateStatus(prodDateInt, coreCode) {
        const prodYear = Math.floor(prodDateInt / 10000);
        const prodMonth = Math.floor((prodDateInt % 10000) / 100);
        const prodDate = new Date(prodYear, prodMonth - 1, 1);
        const today = new Date();
        
        const ageYears = (today - prodDate) / (1000 * 60 * 60 * 24 * 365.25);
        let lifespan = 5.0;
        
        if ([3, 4].includes(coreCode)) lifespan += 2.0;
        
        if (ageYears < lifespan - 2) return { label: "OK", class: "status-ok" };
        if (ageYears < lifespan) return { label: "Attenzione", class: "status-warning" };
        return { label: "Pericolo", class: "status-danger" };
      }

      function formatValue(product, field) {
        let value = product[field.key];
        
        if (value === null || value === undefined) return '-';
        
        if (field.map) {
          value = field.map[value] || value;
        }
        
        if (field.format === 'number' && value) {
          value = Number(value).toLocaleString('it-IT');
        }
        
        if (field.suffix && value !== '-') {
          value += field.suffix;
        }
        
        return value;
      }

      function renderTable(products) {
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        
        if (!products || products.length === 0) {
          tbody.innerHTML = '<tr><td colspan="100" style="text-align:center;padding:40px;color:var(--text-secondary);">Nessun prodotto trovato</td></tr>';
          thead.innerHTML = '';
          return;
        }

        // Definizione dei campi (righe della tabella trasposta)
        const fields = [
          { key: 'nfc_uuid', label: 'Tag UUID', isUUID: true },
          { key: 'prodotto', label: 'Prodotto', map: PRODUCT_MAP },
          { key: 'diametro', label: 'Diametro', suffix: ' mm' },
          { key: 'lunghezza', label: 'Lunghezza', suffix: ' m' },
          { key: 'calza', label: 'Calza', map: CALZA_MAP },
          { key: 'anima', label: 'Anima', map: ANIMA_MAP },
          { key: 'carico_rottura', label: 'Carico Rottura', suffix: ' kg', format: 'number' },
          { key: 'colore', label: 'Colore', map: COLORE_MAP },
          { key: 'uv_resistance', label: 'Res. UV', map: UV_MAP },
          { key: 'trattamento', label: 'Trattamento', map: TRATTAMENTO_MAP },
          { key: 'galleggiabilita', label: 'Galleggiabilità', map: GALLEGG_MAP },
          { key: 'data_produzione', label: 'Data Prod.' },
          { key: 'stato', label: 'Stato', isStatus: true }
        ];

        // Header (UUIDs come colonne)
        let headHTML = '<tr><th class="field-label">Campo</th>';
        products.forEach(p => {
          headHTML += `<th><span class="uuid-header">${p.nfc_uuid}</span></th>`;
        });
        headHTML += '</tr>';
        thead.innerHTML = headHTML;

        // Body (campi come righe)
        let bodyHTML = '';
        fields.forEach(field => {
          bodyHTML += `<tr><td class="field-label">${field.label}</td>`;
          
          products.forEach(product => {
            let cellContent = '';
            
            if (field.isStatus) {
              const status = calculateStatus(product.data_produzione, product.anima);
              cellContent = `<span class="status-badge ${status.class}">${status.label}</span>`;
            } else if (field.isUUID) {
              cellContent = `<span class="uuid-header value-cell" data-uuid="${product.nfc_uuid}">${product.nfc_uuid}</span>`;
            } else if (field.key === 'data_produzione') {
              const prodDate = product.data_produzione?.toString() || "20230101";
              cellContent = `${prodDate.substring(0, 4)}-${prodDate.substring(4, 6)}`;
            } else {
              const value = formatValue(product, field);
              const displayValue = value === '-' ? '<span class="empty-value">-</span>' : value;
              cellContent = `<span class="value-cell">${displayValue}</span>`;
            }
            
            bodyHTML += `<td>${cellContent}</td>`;
          });
          
          bodyHTML += '</tr>';
        });
        
        tbody.innerHTML = bodyHTML;

        // Aggiungi event listener per click sugli UUID
        tbody.querySelectorAll('[data-uuid]').forEach(el => {
          el.addEventListener('click', () => {
            loadScans(el.dataset.uuid);
          });
        });
      }

      function filterProducts(searchTerm) {
        if (!searchTerm) {
          filteredProducts = allProducts;
        } else {
          const term = searchTerm.toLowerCase();
          filteredProducts = allProducts.filter(p => 
            p.nfc_uuid.toLowerCase().includes(term) ||
            (PRODUCT_MAP[p.prodotto] || '').toLowerCase().includes(term)
          );
        }
        
        document.getElementById('productCount').textContent = `${filteredProducts.length} / ${allProducts.length} prodotti`;
        renderTable(filteredProducts);
      }

      async function loadProducts() {
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const productsSectionEl = document.getElementById('productsSection');

        try {
          console.log('Loading products...');
          const db = initDB();

          const { data, error } = await db
            .from('products')
            .select('*')
            .order('data_creazione', { ascending: false });

          if (error) throw error;
          if (!data || data.length === 0) {
            throw new Error('Nessun prodotto trovato nel database');
          }

          console.log(`✓ Loaded ${data.length} products`);
          allProducts = data;
          filteredProducts = data;
          
          document.getElementById('productCount').textContent = `${data.length} prodotti`;
          
          renderTable(data);

          loadingEl.style.display = 'none';
          productsSectionEl.style.display = 'block';

        } catch (err) {
          console.error('Error:', err);
          showError(err.message);
          loadingEl.style.display = 'none';
        }
      }

      async function loadScans(tagUuid) {
        const panel = document.getElementById('scansPanel');
        const list = document.getElementById('scansList');
        const uuidDisplay = document.getElementById('scansUuid');

        console.log(`Loading scans for: ${tagUuid}`);
        
        uuidDisplay.textContent = `UUID: ${tagUuid}`;
        list.innerHTML = '<div class="loading"><div class="spinner" style="width:24px;height:24px;border-width:2px;margin:0 auto;"></div></div>';
        panel.style.display = 'block';
        panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

        try {
          const db = initDB();
          
          const { data, error } = await db
            .from('scans')
            .select('*')
            .eq('nfc_uuid', tagUuid)
            .order('scan_time', { ascending: false });

          if (error) throw error;

          if (!data || data.length === 0) {
            list.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-secondary);">Nessuna scansione registrata</div>';
            return;
          }

          console.log(`✓ Loaded ${data.length} scans`);

          list.innerHTML = data.map(scan => {
            const scanDate = new Date(scan.scan_time);
            const formattedTime = scanDate.toLocaleString('it-IT', {
              day: '2-digit', month: 'short', year: 'numeric',
              hour: '2-digit', minute: '2-digit'
            });
            
            return `
              <div class="scan-item">
                <div class="scan-time">📅 ${formattedTime}</div>
                <div class="scan-meta">👤 Operatore: ${scan.operator_id || 'Non specificato'}</div>
              </div>
            `;
          }).join('');

        } catch (err) {
          console.error('Error loading scans:', err);
          list.innerHTML = `<div style="color:var(--danger);padding:16px;">Errore: ${err.message}</div>`;
        }
      }

      function showError(message) {
        const errorEl = document.getElementById('error');
        errorEl.style.display = 'block';
        errorEl.innerHTML = `
          <div class="error-box">
            <h3>❌ Errore di Connessione</h3>
            <p><strong>Dettaglio:</strong> <code>${message}</code></p>
            
            <h4 style="margin:16px 0 8px;color:var(--warning);">Possibili Soluzioni:</h4>
            <ul style="margin-left:20px;color:var(--text-secondary);">
              <li>Verifica la connessione internet</li>
              <li>Controlla che il database sia accessibile</li>
              <li>Assicurati che le tabelle esistano nel database</li>
              <li>Verifica i permessi di accesso al database</li>
            </ul>
            
            <button class="retry-btn" onclick="location.reload()">🔄 Riprova</button>
          </div>
        `;
      }

      // Event listeners
      document.getElementById('closeScansBtn').addEventListener('click', () => {
        document.getElementById('scansPanel').style.display = 'none';
      });

      document.getElementById('uuidFilter').addEventListener('input', (e) => {
        filterProducts(e.target.value.trim());
      });

      document.addEventListener('DOMContentLoaded', () => {
        console.log('=== Falcord Tracking System ===');
        loadProducts();
      });

    })();
  </script>
</body>
</html>
