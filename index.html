<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falcord Tracking System</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4a4a4a;
      --primary-dark: #2d2d2d;
      --accent: #FFD700;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg-dark: #2d2d2d;
      --bg-card: #3a3a3a;
      --text-primary: #f5f5f5;
      --text-secondary: #b0b0b0;
      --border: #555555;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a1a 100%);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    header {
      text-align: center;
      padding: 24px 20px 32px;
      border-bottom: 2px solid var(--accent);
      margin-bottom: 24px;
      background: var(--primary-dark);
      border-radius: var(--radius);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .logo-img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid var(--danger);
      border-radius: var(--radius);
      padding: 24px;
      margin: 20px auto;
      max-width: 800px;
      text-align: left;
    }

    .error-box h3 {
      color: var(--danger);
      margin-bottom: 12px;
    }

    .error-box code {
      background: var(--bg-dark);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
      color: var(--warning);
    }

    .retry-btn {
      background: var(--accent);
      color: var(--primary-dark);
      border: none;
      padding: 10px 24px;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      font-size: 1rem;
    }

    .retry-btn:hover { opacity: 0.9; }

    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .table-container {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      margin: 20px 0;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: var(--primary); }

    th {
      padding: 14px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--text-primary);
      border-bottom: 2px solid var(--accent);
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    tbody tr:hover {
      background: #4a4a4a;
      cursor: pointer;
    }

    .uuid-cell {
      font-family: monospace;
      color: var(--accent);
      background: rgba(255, 215, 0, 0.1);
      padding: 4px 8px;
      border-radius: 4px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-ok {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .status-warning {
      background: rgba(245, 158, 11, 0.2);
      color: var(--warning);
      border: 1px solid var(--warning);
    }

    .status-danger {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .scans-panel {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 2px solid var(--accent);
      padding: 20px;
      margin-top: 24px;
      display: none;
    }

    .scans-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .scans-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .close-btn {
      background: var(--primary);
      border: none;
      color: var(--text-primary);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 6px;
    }

    .close-btn:hover { background: var(--danger); }

    .scan-item {
      background: var(--bg-dark);
      padding: 12px 16px;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      margin-bottom: 8px;
    }

    .scan-time {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .scan-meta {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-secondary);
      margin-top: 40px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <img src="falcord_logo_500.png" alt="Falcord Logo" class="logo-img" />
        <div>
          <h1>Falcord Tracking System</h1>
          <p class="subtitle">Gestione digitale trasparente del ciclo di vita</p>
        </div>
      </div>
    </header>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Caricamento dati dal database...</p>
    </div>

    <div id="error" style="display: none;"></div>

    <div id="productsSection" style="display: none;">
      <h2 style="color: var(--accent); margin: 24px 0 16px;">📦 Prodotti</h2>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Tag UUID</th>
              <th>Prodotto</th>
              <th>Diametro</th>
              <th>Lunghezza</th>
              <th>Data Produzione</th>
              <th>Stato</th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>

      <div id="scansPanel" class="scans-panel">
        <div class="scans-header">
          <div>
            <div class="scans-title">🔍 Storico Scansioni</div>
            <div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 2px;" id="scansUuid"></div>
          </div>
          <button class="close-btn" id="closeScansBtn">×</button>
        </div>
        <div id="scansList"></div>
      </div>
    </div>

    <footer>
      <p>Falcord Tracking System • Gestione Digitale Ciclo di Vita</p>
      <p style="margin-top: 8px;">© 2024 Falcord S.r.l. • v1.2</p>
    </footer>
  </div>

  <script>
    (function() {
      'use strict';

      // Configuration - Hidden from UI
      const CONFIG = {
        DB_URL: 'https://exshynvdaacktlbwfqrq.supabase.co',
        DB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4c2h5bnZkYWFja3RsYndmcXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODI4MDcsImV4cCI6MjA4OTI1ODgwN30.KOGEWBVqh_JGOlb-lhhVM2mcFmmIMToCGbFk6s0cE-c'
      };

      const PRODUCT_MAP = {
        1: "Mayorca", 2: "Capri", 3: "Mega Yacht", 4: "Megayacht SK",
        5: "Tornado", 6: "Skipper", 7: "Tornado PPL", 8: "Trefil",
        9: "Trefil HT", 10: "Trefil M", 11: "Liberty Oblix", 12: "Liberty SK", 13: "T16"
      };

      const CORE_MAP = {
        1: "Poliestere", 2: "Nylon", 3: "Dyneema SK78", 4: "HMWPE Oblix"
      };

      let dbClient = null;

      function initDB() {
        if (dbClient) return dbClient;
        
        try {
          dbClient = window.supabase.createClient(CONFIG.DB_URL, CONFIG.DB_KEY);
          console.log('✓ Database client initialized');
          return dbClient;
        } catch (error) {
          console.error('✗ Database initialization failed:', error);
          throw error;
        }
      }

      function calculateStatus(prodDateInt, coreCode) {
        const prodYear = Math.floor(prodDateInt / 10000);
        const prodMonth = Math.floor((prodDateInt % 10000) / 100);
        const prodDate = new Date(prodYear, prodMonth - 1, 1);
        const today = new Date();
        
        const ageYears = (today - prodDate) / (1000 * 60 * 60 * 24 * 365.25);
        let lifespan = 5.0;
        
        if ([3, 4].includes(coreCode)) lifespan += 2.0;
        
        if (ageYears < lifespan - 2) return { label: "OK", class: "status-ok" };
        if (ageYears < lifespan) return { label: "Attenzione", class: "status-warning" };
        return { label: "Pericolo", class: "status-danger" };
      }

      async function loadProducts() {
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const productsSectionEl = document.getElementById('productsSection');

        try {
          console.log('Loading products...');
          const db = initDB();

          const { data, error } = await db
            .from('products')
            .select('*')
            .order('data_creazione', { ascending: false });

          if (error) throw error;
          if (!data || data.length === 0) {
            throw new Error('Nessun prodotto trovato nel database');
          }

          console.log(`✓ Loaded ${data.length} products`);

          const tbody = document.getElementById('productsTableBody');
          tbody.innerHTML = data.map(product => {
            const status = calculateStatus(product.data_produzione, product.anima);
            const prodDate = product.data_produzione?.toString() || "20230101";
            
            return `
              <tr data-uuid="${product.nfc_uuid}">
                <td><span class="uuid-cell">${product.nfc_uuid}</span></td>
                <td>${PRODUCT_MAP[product.prodotto] || 'Sconosciuto'}</td>
                <td>${product.diametro} mm</td>
                <td>${product.lunghezza} m</td>
                <td>${prodDate.substring(0, 4)}-${prodDate.substring(4, 6)}</td>
                <td><span class="status-badge ${status.class}">${status.label}</span></td>
              </tr>
            `;
          }).join('');

          tbody.querySelectorAll('tr').forEach(row => {
            row.addEventListener('click', () => {
              const uuid = row.dataset.uuid;
              loadScans(uuid);
            });
          });

          loadingEl.style.display = 'none';
          productsSectionEl.style.display = 'block';

        } catch (err) {
          console.error('Error:', err);
          showError(err.message);
          loadingEl.style.display = 'none';
        }
      }

      async function loadScans(tagUuid) {
        const panel = document.getElementById('scansPanel');
        const list = document.getElementById('scansList');
        const uuidDisplay = document.getElementById('scansUuid');

        console.log(`Loading scans for: ${tagUuid}`);
        
        uuidDisplay.textContent = `UUID: ${tagUuid}`;
        list.innerHTML = '<div class="loading"><div class="spinner" style="width:24px;height:24px;border-width:2px;margin:0 auto;"></div></div>';
        panel.style.display = 'block';
        panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

        try {
          const db = initDB();
          
          const { data, error } = await db
            .from('scans')
            .select('*')
            .eq('nfc_uuid', tagUuid)
            .order('scan_time', { ascending: false });

          if (error) throw error;

          if (!data || data.length === 0) {
            list.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-secondary);">Nessuna scansione registrata</div>';
            return;
          }

          console.log(`✓ Loaded ${data.length} scans`);

          list.innerHTML = data.map(scan => {
            const scanDate = new Date(scan.scan_time);
            const formattedTime = scanDate.toLocaleString('it-IT', {
              day: '2-digit', month: 'short', year: 'numeric',
              hour: '2-digit', minute: '2-digit'
            });
            
            return `
              <div class="scan-item">
                <div class="scan-time">📅 ${formattedTime}</div>
                <div class="scan-meta">👤 Operatore: ${scan.operator_id || 'Non specificato'}</div>
              </div>
            `;
          }).join('');

        } catch (err) {
          console.error('Error loading scans:', err);
          list.innerHTML = `<div style="color:var(--danger);padding:16px;">Errore: ${err.message}</div>`;
        }
      }

      function showError(message) {
        const errorEl = document.getElementById('error');
        errorEl.style.display = 'block';
        errorEl.innerHTML = `
          <div class="error-box">
            <h3>❌ Errore di Connessione</h3>
            <p><strong>Dettaglio:</strong> <code>${message}</code></p>
            
            <h4 style="margin:16px 0 8px;color:var(--warning);">Possibili Soluzioni:</h4>
            <ul style="margin-left:20px;color:var(--text-secondary);">
              <li>Verifica la connessione internet</li>
              <li>Controlla che il database sia accessibile</li>
              <li>Assicurati che le tabelle esistano nel database</li>
              <li>Verifica i permessi di accesso al database</li>
            </ul>
            
            <button class="retry-btn" onclick="location.reload()">🔄 Riprova</button>
          </div>
        `;
      }

      document.getElementById('closeScansBtn').addEventListener('click', () => {
        document.getElementById('scansPanel').style.display = 'none';
      });

      document.addEventListener('DOMContentLoaded', () => {
        console.log('=== Falcord Tracking System ===');
        loadProducts();
      });

    })();
  </script>
</body>
</html>
